<!DOCTYPE html>
<html>
<head>
    <title>Humanoid Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; padding: 10px; margin: 0; }

        .toolbar { position: sticky; top: 0; background: #222; padding: 15px; border-radius: 0 0 8px 8px;
                   display: flex; gap: 10px; flex-wrap: wrap; z-index: 100; margin-bottom: 20px;
                   box-shadow: 0 4px 10px rgba(0,0,0,0.5); justify-content: center; align-items: center; }

        button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-save    { background: #4caf50; color: white; }
        .btn-neutral { background: #f44336; color: white; }
        .btn-squat   { background: #2196f3; color: white; }
        .btn-stand   { background: #03a9f4; color: white; }
        .btn-preset  { background: #673ab7; color: white; margin: 2px; }
        .btn-move    { background: #ff9800; color: black; padding: 5px 9px; font-size: 12px; }

        /* --- ADD START: E-stop button styles --- */
        .btn-estop   { background: #d32f2f; color: white; font-size: 15px; padding: 10px 18px;
                       border: 2px solid #ff5252; letter-spacing: 0.5px; }
        .btn-clear   { background: #388e3c; color: white; font-size: 13px; }
        .estop-banner { display: none; background: #b71c1c; color: white; text-align: center;
                        padding: 10px; font-size: 14px; font-weight: bold; border-radius: 6px;
                        margin-bottom: 12px; letter-spacing: 1px; }
        .estop-banner.visible { display: block; }
        /* --- ADD END --- */

        input[type=text], input[type=number] {
            padding: 8px; border-radius: 4px; border: 1px solid #555; background: #333; color: white;
        }

        .container { max-width: 720px; margin: 0 auto; padding-bottom: 60px; }
        .preset-box { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px;
                      text-align: center; border: 1px solid #333; }

        .move-panel { background: #1a1a2e; border: 1px solid #ff9800; border-radius: 8px;
                      padding: 14px; margin-bottom: 20px; }
        .move-panel h3 { margin: 0 0 10px; color: #ff9800; font-size: 14px; }
        .move-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .move-row select { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; }

        .servo-row { display: flex; flex-wrap: wrap; align-items: center; background: #1e1e1e;
                     margin-bottom: 8px; padding: 10px; border-radius: 6px; border-left: 4px solid #333; }
        .right-leg { border-left-color: #ff9800; }
        .left-leg  { border-left-color: #2196f3; }

        .info { flex: 1; min-width: 170px; font-size: 13px; }
        .info .joint-name  { font-weight: bold; }
        .info .joint-meta  { font-size: 11px; color: #aaa; margin-top: 3px; }
        .info .hint-badge  { display: inline-block; padding: 1px 6px; border-radius: 3px;
                             font-size: 10px; font-weight: bold; margin-top: 4px; }
        .hint-pos { background: #1b5e20; color: #69f0ae; }
        .hint-neg { background: #b71c1c; color: #ff8a80; }
        .info .neutral-tag { color: #00bcd4; font-size: 10px; margin-top: 3px; }

        .controls { flex: 2; display: flex; align-items: center; gap: 8px; min-width: 300px; }
        input[type=range] { flex-grow: 1; min-width: 100px; }
        .input-group { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; }
        .input-group input[type=number] { width: 58px; text-align: center; padding: 5px; }

        #ws-status { font-size: 12px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn-neutral" onclick="sendCmd('RESETP')">Neutral</button>
    <button class="btn-squat"   onclick="sendCmd('SQUAT_DOWN')">Squat Down</button>
    <button class="btn-stand"   onclick="sendCmd('STAND_UP')">Stand Up</button>
    <input  type="text" id="poseName" placeholder="Pose name" style="width:100px;">
    <button class="btn-save"    onclick="savePose()">Save</button>
    <!-- ADD START: E-stop controls -->
    <button class="btn-estop"   onclick="emergencyStop()">⛔ E-STOP</button>
    <button class="btn-clear"   onclick="clearEstop()" id="clearBtn" disabled>✅ Clear E-Stop</button>
    <!-- ADD END -->
    <span   id="ws-status" style="color:gray;">Connecting…</span>
</div>

<div class="container">

    <!-- ADD START: E-stop banner (hidden until activated) -->
    <div id="estopBanner" class="estop-banner">
        ⚠️ EMERGENCY STOP ACTIVE — Servo outputs are DISABLED
    </div>
    <!-- ADD END -->

    <div class="preset-box">
        <span style="color:#aaa;font-size:12px;">Saved Presets:</span><br>
        <div id="presetList" style="margin-top:10px;"></div>
    </div>

    <!-- Named Movement Panel -->
    <div class="move-panel">
        <h3>⚡ Named Movement</h3>
        <div class="move-row">
            <select id="mv-joint"><option value="">— joint —</option></select>
            <select id="mv-type">
                <option value="flex">flex</option>
                <option value="extend">extend</option>
            </select>
            <div class="input-group">
                <!-- ADD: step="0.5" and explicit Number() in sendNamedMove() -->
                <input type="number" id="mv-mag" value="20" min="-270" max="270" step="0.5">
                magnitude (°)
            </div>
            <button class="btn-move" onclick="sendNamedMove()">Send</button>
            <span style="font-size:11px;color:#aaa;">→ MOVE_NAMED:ch:type:mag</span>
        </div>
    </div>

    <h2 style="margin-bottom:8px;">Joint Control</h2>
    <div id="servosContainer"></div>

</div>

<script>
// =============================================================================
//  CONSTANTS  (must match firmware joint_map.h)
// =============================================================================
const USMIN  = 500;
const USMAX  = 2500;
const RANGE  = 270;

// =============================================================================
//  JOINT DEFAULTS  (used for initial render; overwritten by JOINTS: message)
// =============================================================================
const JOINT_DEFAULTS = [
    {ch: 0,  name:"Right Ankle Roll",   neutral_pulse:1470, neutral_deg:131, hint:+1, legClass:"right-leg"},
    {ch: 1,  name:"Right Ankle Pitch",  neutral_pulse:1426, neutral_deg:125, hint:+1, legClass:"right-leg"},
    {ch: 2,  name:"Right Knee Pitch",   neutral_pulse:1485, neutral_deg:133, hint:-1, legClass:"right-leg"},
    {ch: 3,  name:"Right Hip Roll",     neutral_pulse:1463, neutral_deg:130, hint:+1, legClass:"right-leg"},
    {ch: 4,  name:"Right Hip Yaw",      neutral_pulse:1463, neutral_deg:130, hint:+1, legClass:"right-leg"},
    {ch: 5,  name:"Right Hip Pitch",    neutral_pulse:1574, neutral_deg:145, hint:+1, legClass:"right-leg"},
    {ch:10,  name:"Left Hip Pitch",     neutral_pulse:1574, neutral_deg:145, hint:-1, legClass:"left-leg"},
    {ch:11,  name:"Left Hip Yaw",       neutral_pulse:1463, neutral_deg:130, hint:-1, legClass:"left-leg"},
    {ch:12,  name:"Left Hip Roll",      neutral_pulse:1493, neutral_deg:134, hint:-1, legClass:"left-leg"},
    {ch:13,  name:"Left Knee Pitch",    neutral_pulse:1448, neutral_deg:128, hint:+1, legClass:"left-leg"},
    {ch:14,  name:"Left Ankle Pitch",   neutral_pulse:1426, neutral_deg:125, hint:-1, legClass:"left-leg"},
    {ch:15,  name:"Left Ankle Roll",    neutral_pulse:1441, neutral_deg:127, hint:-1, legClass:"left-leg"},
];

// =============================================================================
//  CONVERSION HELPERS  (mirrors joint_map.h inline functions)
// =============================================================================
function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

function degToPulse(deg) {
    deg = clamp(deg, 0, RANGE);
    return Math.round((deg / RANGE) * (USMAX - USMIN) + USMIN);
}

function pulseToDeg(pls) {
    pls = clamp(pls, USMIN, USMAX);
    return +( ((pls - USMIN) / (USMAX - USMIN)) * RANGE ).toFixed(1);
}

// =============================================================================
//  UI BUILD
// =============================================================================
function buildUI() {
    const container = document.getElementById("servosContainer");
    const mvSelect  = document.getElementById("mv-joint");
    container.innerHTML = "";
    mvSelect.innerHTML  = '<option value="">— joint —</option>';

    JOINT_DEFAULTS.forEach(j => {
        const hintLabel = j.hint === 1 ? "+1 (↑pulse=flex)" : "-1 (↓pulse=flex)";
        const hintClass = j.hint === 1 ? "hint-pos" : "hint-neg";

        container.innerHTML += `
        <div class="servo-row ${j.legClass}">
            <div class="info">
                <div class="joint-name">${j.name}</div>
                <div class="joint-meta">CH ${j.ch}</div>
                <div class="neutral-tag">Neutral: ${j.neutral_pulse} µs / ${j.neutral_deg}°</div>
                <span class="hint-badge ${hintClass}">${hintLabel}</span>
            </div>
            <div class="controls">
                <input type="range" id="sl${j.ch}" min="0" max="270" step="0.5"
                       value="${j.neutral_deg}" oninput="uiUpdate(${j.ch},'sl')">
                <div class="input-group">
                    <input type="number" id="deg${j.ch}" value="${j.neutral_deg}" step="0.5"
                           onchange="uiUpdate(${j.ch},'deg')">
                    Deg (°)
                </div>
                <div class="input-group">
                    <input type="number" id="pls${j.ch}" value="${j.neutral_pulse}"
                           onchange="uiUpdate(${j.ch},'pls')">
                    Pulse (µs)
                </div>
            </div>
        </div>`;

        const opt = document.createElement("option");
        opt.value = j.ch;
        opt.textContent = `CH${j.ch} — ${j.name}`;
        mvSelect.appendChild(opt);
    });
}

// =============================================================================
//  SLIDER SYNC  — uiUpdate sends to ESP32; syncUI receives authoritative state
// =============================================================================
function uiUpdate(ch, source) {
    let deg, pls;
    if (source === 'sl') {
        deg = parseFloat(document.getElementById('sl'+ch).value);
        pls = degToPulse(deg);
    } else if (source === 'deg') {
        deg = parseFloat(document.getElementById('deg'+ch).value);
        pls = degToPulse(deg);
    } else if (source === 'pls') {
        pls = parseInt(document.getElementById('pls'+ch).value);
        deg = pulseToDeg(pls);
    }
    if (source !== 'sl')  document.getElementById('sl'+ch).value  = deg;
    if (source !== 'deg') document.getElementById('deg'+ch).value = deg;
    if (source !== 'pls') document.getElementById('pls'+ch).value = pls;

    if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(ch + ":" + deg);
}

// Called when STATE: message arrives — single source of truth update
function syncUI(ch, pulse_us, deg) {
    const sl = document.getElementById('sl'+ch);
    if (!sl) return;
    document.getElementById('sl'+ch).value  = deg;
    document.getElementById('deg'+ch).value = deg;
    document.getElementById('pls'+ch).value = pulse_us;
}

// =============================================================================
//  NAMED MOVEMENT
// =============================================================================
function sendNamedMove() {
    const ch  = document.getElementById("mv-joint").value;
    const mv  = document.getElementById("mv-type").value;
    // --- FIX: explicit Number() conversion so magnitude is numeric, not a string ---
    const mag = Number(document.getElementById("mv-mag").value);

    if (!ch) { alert("Select a joint first."); return; }
    if (isNaN(mag)) { alert("Magnitude must be a number."); return; }

    console.log(`[UI] sendNamedMove: ch=${ch} move=${mv} magnitude=${mag}`);
    sendCmd(`MOVE_NAMED:${ch}:${mv}:${mag}`);
    // State will update via the authoritative STATE: message broadcast by firmware
}

// =============================================================================
//  --- ADD START: EMERGENCY STOP CONTROLS ---
// =============================================================================
let estopActive = false;

function emergencyStop() {
    if (!confirm("Activate Emergency Stop?\nThis will disable all servo outputs immediately.")) return;
    sendCmd("ESTOP");
    // UI updates via ESTOP:ACTIVE message
}

function clearEstop() {
    if (!confirm("Clear Emergency Stop and re-enable servo outputs?")) return;
    sendCmd("CLEAR_ESTOP");
    // UI updates via ESTOP:CLEAR message
}

function setEstopUI(active) {
    estopActive = active;
    const banner   = document.getElementById("estopBanner");
    const clearBtn = document.getElementById("clearBtn");
    banner.classList.toggle("visible", active);
    clearBtn.disabled = !active;
    // Optionally gray out all servo controls while e-stopped
    document.getElementById("servosContainer").style.opacity = active ? "0.4" : "1";
    document.getElementById("servosContainer").style.pointerEvents = active ? "none" : "";
}
// =============================================================================
//  --- ADD END ---
// =============================================================================

// =============================================================================
//  WEBSOCKET
// =============================================================================
var ws;
var gateway = `ws://${window.location.hostname}/ws`;

function initWebSocket() {
    ws = new WebSocket(gateway);

    ws.onopen = () => {
        document.getElementById('ws-status').innerText   = "Connected";
        document.getElementById('ws-status').style.color = "#4caf50";
    };
    ws.onclose = () => {
        document.getElementById('ws-status').innerText   = "Disconnected";
        document.getElementById('ws-status').style.color = "#f44336";
        setTimeout(initWebSocket, 2000);
    };

    ws.onmessage = (event) => {
        const msg = event.data;
        console.log("[WS RX]", msg);

        if (msg.startsWith("POSES:")) {
            updatePoseList(msg.substring(6));
        }
        else if (msg.startsWith("STATE:")) {
            // Format: "STATE:<ch>=<pulse>:<deg>,...;ESTOP=0|1"
            const [statePart, estopPart] = msg.substring(6).split(";");
            statePart.split(",").forEach(pair => {
                const [ch_str, rest] = pair.split("=");
                if (!rest) return;
                const [pls_str, deg_str] = rest.split(":");
                syncUI(parseInt(ch_str), parseInt(pls_str), parseFloat(deg_str));
            });
            // Sync E-stop state from firmware
            if (estopPart) {
                setEstopUI(estopPart.split("=")[1] === "1");
            }
        }
        else if (msg.startsWith("JOINTS:")) {
            parseJointInfo(msg.substring(7));
        }
        // --- ADD START: handle E-stop push messages ---
        else if (msg === "ESTOP:ACTIVE") {
            setEstopUI(true);
        }
        else if (msg === "ESTOP:CLEAR") {
            setEstopUI(false);
        }
        // --- ADD END ---
    };
}

// Updates direction hint badges from live JOINTS: message
function parseJointInfo(csv) {
    csv.split(",").forEach(entry => {
        const parts = entry.split("|");
        if (parts.length < 5) return;
        const ch   = parseInt(parts[0]);
        const hint = parseInt(parts[4]);
        const badge = document.querySelector(`#sl${ch}`)
                      ?.closest(".servo-row")
                      ?.querySelector(".hint-badge");
        if (badge) {
            badge.textContent = hint === 1 ? "+1 (↑pulse=flex)" : "-1 (↓pulse=flex)";
            badge.className   = "hint-badge " + (hint === 1 ? "hint-pos" : "hint-neg");
        }
    });
}

function sendCmd(cmd) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        console.log("[WS TX] CMD:" + cmd);
        ws.send("CMD:" + cmd);
    }
}

function savePose() {
    const name = document.getElementById("poseName").value.trim();
    if (name && ws && ws.readyState === WebSocket.OPEN) {
        ws.send("SAVE:" + name);
        document.getElementById("poseName").value = '';
    } else {
        alert("Enter a valid pose name and check connection.");
    }
}

function updatePoseList(csv) {
    const list = document.getElementById("presetList");
    list.innerHTML = "";
    csv.split(",").filter(p => p.trim()).forEach(pose => {
        const btn = document.createElement("button");
        btn.className = "btn-preset";
        btn.innerText = pose;
        btn.onclick   = () => sendCmd("LOAD:" + pose);
        list.appendChild(btn);
    });
}

window.onload = () => { buildUI(); initWebSocket(); };
</script>
</body>
</html>
