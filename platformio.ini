[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; File System configuration
board_build.filesystem = littlefs

; Partition scheme — default "default" allocates only ~1.2 MB for the app.
; BMI160Gen + ESPAsyncWebServer + LittleFS together exceed that budget.
; "huge_app" gives 3 MB app / 1 MB SPIFFS — fits comfortably.
board_build.partitions = huge_app.csv

; NOTE: LTO (-flto) is intentionally absent.
; GCC 8.4.0 for Xtensa (the toolchain this PlatformIO version ships) requires
; a linker plugin to handle LTO objects that is not invoked correctly on Windows.
; LTO would only reduce binary size, not affect runtime performance.
; The huge_app partition already provides sufficient headroom.

lib_deps =
    ; Adafruit Servo Driver (Works fine from registry)
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0

    ; Direct GitHub links for Async libraries (Solves the "UnknownPackageError")
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git